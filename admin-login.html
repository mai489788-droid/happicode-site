<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập quản trị - Dr.Gifter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-auth-page">
  <div class="mesh-bg"></div>
  <div class="grid-overlay"></div>
  <div class="auth-bg-shape auth-bg-shape-1"></div>
  <div class="auth-bg-shape auth-bg-shape-2"></div>
  <div class="auth-bg-shape auth-bg-shape-4"></div>

  <div class="container position-relative">
    <div class="row justify-content-center align-items-center min-vh-100 py-5">
      <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
        <div class="glass-auth-card admin-glass-card">
          <div class="glass-auth-inner p-4 p-md-5">
            <div class="text-center mb-4">
              <div class="admin-shield-icon mb-3">
                <i class="bi bi-shield-lock-fill"></i>
              </div>
              <h1 class="auth-title h4 fw-bold">Bảng quản trị</h1>
              <p class="auth-subtitle">Chỉ dành cho quản trị viên</p>
            </div>
            <div class="login-lock-banner" id="adminLoginLockBanner"></div>
            <form id="adminLoginForm">
              <div class="floating-group mb-4">
                <input type="text" class="form-control glass-input" id="adminUsername" placeholder=" " required>
                <label for="adminUsername">Tên đăng nhập</label>
              </div>
              <div class="floating-group mb-4">
                <input type="password" class="form-control glass-input" id="adminPassword" placeholder=" " required>
                <label for="adminPassword">Mật khẩu</label>
              </div>
              <button type="submit" class="btn btn-gradient w-100 auth-submit-btn">Vào bảng điều khiển</button>
            </form>
            <p class="text-center mt-4 mb-0 auth-footer-text">
              <a href="index.html" class="auth-link"><i class="bi bi-arrow-left"></i> Về trang chủ</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
