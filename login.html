<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Dr.Gifter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="mesh-bg"></div>
  <div class="grid-overlay"></div>
  <div class="auth-bg-shape auth-bg-shape-1"></div>
  <div class="auth-bg-shape auth-bg-shape-2"></div>
  <div class="auth-bg-shape auth-bg-shape-3"></div>

  <div class="container position-relative">
    <div class="row justify-content-center align-items-center min-vh-100 py-5">
      <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
        <div class="glass-auth-card">
          <div class="glass-auth-inner p-4 p-md-5">
            <div class="text-center mb-4">
              <a href="index.html" class="auth-brand">
                <i class="bi bi-gift-fill"></i> Dr.Gifter
              </a>
              <h1 class="auth-title h4 fw-bold mt-3">Chào mừng trở lại</h1>
              <p class="auth-subtitle">Đăng nhập vào tài khoản của bạn nhé</p>
            </div>
            <div class="login-lock-banner" id="loginLockBanner"></div>
            <form id="loginForm">
              <div class="floating-group mb-4">
                <input type="email" class="form-control glass-input" id="loginEmail" placeholder=" " required>
                <label for="loginEmail">Email</label>
              </div>
              <div class="floating-group mb-4">
                <input type="password" class="form-control glass-input" id="loginPassword" placeholder=" " required>
                <label for="loginPassword">Mật khẩu</label>
              </div>
              <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input glass-check" id="rememberMe">
                <label class="form-check-label auth-check-label" for="rememberMe">Ghi nhớ tài khoản</label>
              </div>
              <button type="submit" class="btn btn-gradient w-100 auth-submit-btn">Đăng nhập</button>
            </form>
            <p class="text-center mt-4 mb-0 auth-footer-text">
              Chưa có tài khoản? <a href="register.html" class="auth-link">Đăng ký</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
