<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - HappyCode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="mesh-bg"></div>
  <div class="grid-overlay"></div>
  <div class="auth-bg-shape auth-bg-shape-1"></div>
  <div class="auth-bg-shape auth-bg-shape-2"></div>
  <div class="auth-bg-shape auth-bg-shape-3"></div>

  <div class="container position-relative">
    <div class="row justify-content-center align-items-center min-vh-100 py-5">
      <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
        <div class="glass-auth-card">
          <div class="glass-auth-inner p-4 p-md-5">
            <div class="text-center mb-4">
              <a href="index.html" class="auth-brand">
                <i class="bi bi-gift-fill"></i> HappyCode
              </a>
              <h1 class="auth-title h4 fw-bold mt-3">Tạo tài khoản mới</h1>
              <p class="auth-subtitle">Hãy tham gia cùng chúng mình nhé</p>
            </div>
            <form id="registerForm">
              <div class="floating-group mb-4">
                <input type="text" class="form-control glass-input" id="registerFullName" placeholder=" " required>
                <label for="registerFullName">Họ và tên</label>
              </div>
              <div class="floating-group mb-4">
                <input type="email" class="form-control glass-input" id="registerEmail" placeholder=" " required>
                <label for="registerEmail">Email</label>
              </div>
              <div class="floating-group mb-4">
                <input type="password" class="form-control glass-input" id="registerPassword" placeholder=" " required>
                <label for="registerPassword">Mật khẩu</label>
              </div>
              <div class="floating-group mb-4">
                <input type="password" class="form-control glass-input" id="registerConfirmPassword" placeholder=" " required>
                <label for="registerConfirmPassword">Nhập lại mật khẩu</label>
              </div>
              <button type="submit" class="btn btn-gradient w-100 auth-submit-btn">Đăng ký</button>
            </form>
            <p class="text-center mt-4 mb-0 auth-footer-text">
              Đã có tài khoản? <a href="login.html" class="auth-link">Đăng nhập</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
